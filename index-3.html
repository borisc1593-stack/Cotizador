<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Cotizador Publicitario</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --green: #16a34a;
            --red: #dc2626;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 15px;
            padding-bottom: 80px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { color: var(--primary); font-size: 22px; margin-bottom: 15px; text-align: center; }
        .card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #475569; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 10px;
            background: #f8fafc;
        }
        input:focus { outline: none; border-color: var(--primary); background: #fff; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        .m2-display {
            text-align: center;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 10px;
        }
        .m2-display span { font-weight: 700; color: var(--primary); font-size: 16px; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-add { background: var(--primary); color: white; }
        .btn-ws { background: #25d366; color: white; margin-top: 10px; }
        .btn-clear { background: #fee2e2; color: var(--red); margin-top: 8px; font-size: 13px; padding: 8px; }
        .items-title { font-weight: 700; font-size: 14px; color: #475569; margin-bottom: 8px; }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 14px; }
        .item-detail { font-size: 12px; color: #64748b; margin-top: 2px; }
        .item-price { font-weight: 700; color: var(--primary); font-size: 15px; margin: 0 10px; white-space: nowrap; }
        .btn-del-item {
            background: none;
            border: none;
            color: var(--red);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            width: auto;
        }
        .total-box {
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }
        .total-label { font-size: 14px; opacity: 0.9; }
        .total-amount { font-size: 24px; font-weight: 900; }
    </style>
</head>
<body>
<div class="container">
    <h1>📐 Cotizador Publicitario</h1>

    <div class="card">
        <div>
            <label>Producto / Servicio</label>
            <input type="text" id="producto" placeholder="Ej: Lona front, Vinil...">
        </div>
        <div class="row">
            <div>
                <label>Ancho (m)</label>
                <input type="number" id="ancho" step="0.01" placeholder="0.00" oninput="calcularM2()">
            </div>
            <div>
                <label>Largo (m)</label>
                <input type="number" id="largo" step="0.01" placeholder="0.00" oninput="calcularM2()">
            </div>
        </div>
        <div class="m2-display">Total m²: <span id="displayM2">0.00</span></div>
        <div>
            <label>Precio por m² ($)</label>
            <input type="number" id="precioM2" step="0.01" placeholder="0.00">
        </div>
        <button class="btn btn-add" onclick="agregarItem()">+ Agregar a cotización</button>
    </div>

    <div class="card" id="seccion-lista" style="display:none">
        <div class="items-title">📋 Productos agregados</div>
        <div id="lista-items"></div>
        <div class="total-box">
            <span class="total-label">TOTAL</span>
            <span class="total-amount" id="total-general">$0.00</span>
        </div>
        <button class="btn btn-ws" onclick="enviarWhatsApp()">📲 Enviar por WhatsApp</button>
        <button class="btn btn-clear" onclick="borrarTodo()">🗑️ Borrar todo y empezar de nuevo</button>
    </div>
</div>

<script>
    let items = [];

    function calcularM2() {
        const ancho = parseFloat(document.getElementById('ancho').value) || 0;
        const largo = parseFloat(document.getElementById('largo').value) || 0;
        const m2 = (ancho * largo).toFixed(2);
        document.getElementById('displayM2').textContent = m2;
        return parseFloat(m2);
    }

    function agregarItem() {
        const producto = document.getElementById('producto').value.trim();
        const ancho = parseFloat(document.getElementById('ancho').value) || 0;
        const largo = parseFloat(document.getElementById('largo').value) || 0;
        const precioM2 = parseFloat(document.getElementById('precioM2').value) || 0;
        const m2 = parseFloat((ancho * largo).toFixed(2));
        const total = parseFloat((m2 * precioM2).toFixed(2));

        if (!producto || m2 <= 0 || precioM2 <= 0) {
            alert("Por favor completa todos los datos");
            return;
        }

        items.push({ id: Date.now(), producto, ancho, largo, m2, precioM2, total });

        document.getElementById('producto').value = '';
        document.getElementById('ancho').value = '';
        document.getElementById('largo').value = '';
        document.getElementById('precioM2').value = '';
        document.getElementById('displayM2').textContent = '0.00';

        dibujar();
    }

    function eliminarItem(id) {
        items = items.filter(i => i.id !== id);
        dibujar();
    }

    function borrarTodo() {
        if (confirm("¿Borrar toda la cotización?")) {
            items = [];
            dibujar();
        }
    }

    function dibujar() {
        const lista = document.getElementById('lista-items');
        const seccion = document.getElementById('seccion-lista');

        if (items.length === 0) {
            seccion.style.display = 'none';
            return;
        }

        seccion.style.display = 'block';

        lista.innerHTML = items.map(i => `
            <div class="item">
                <div class="item-info">
                    <div class="item-name">${i.producto}</div>
                    <div class="item-detail">${i.m2}m² (${i.ancho}x${i.largo}) × $${i.precioM2}/m²</div>
                </div>
                <span class="item-price">$${i.total.toFixed(2)}</span>
                <button class="btn-del-item" onclick="eliminarItem(${i.id})">✕</button>
            </div>
        `).join('');

        const total = items.reduce((s, i) => s + i.total, 0);
        document.getElementById('total-general').textContent = '$' + total.toFixed(2);
    }

    function enviarWhatsApp() {
        const lineas = items.map(i =>
            `• ${i.producto}: ${i.m2}m² x $${i.precioM2} = $${i.total.toFixed(2)}`
        ).join('\n');
        const total = items.reduce((s, i) => s + i.total, 0);
        const mensaje = `*COTIZACIÓN*\n\n${lineas}\n\n*TOTAL: $${total.toFixed(2)}*`;
        window.open('https://wa.me/?text=' + encodeURIComponent(mensaje), '_blank');
    }
</script>
</body>
</html>
