<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>📐 Cotizador Publicitario</title>
    <link rel="manifest" href="manifest-cotizador.json"/>
    <meta name="theme-color" content="#2563eb"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="Cotizador"/>
    <link rel="apple-touch-icon" href="icon-cotizador.png"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f8fafc; color: #1e293b; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { color: #2563eb; font-size: 22px; margin-bottom: 15px; text-align: center; }
        .card { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #475569; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-bottom: 10px; background: #f8fafc; }
        input:focus { outline: none; border-color: #2563eb; background: #fff; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        .m2-display { text-align: center; font-size: 13px; color: #64748b; margin-bottom: 10px; }
        .m2-display span { font-weight: 700; color: #2563eb; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer; }
        .btn-add { background: #2563eb; color: white; }
        .btn-ws { background: #25d366; color: white; margin-top: 10px; }
        .btn-clear { background: #fee2e2; color: #dc2626; margin-top: 8px; font-size: 13px; padding: 8px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .items-title { font-weight: 700; font-size: 14px; color: #475569; margin-bottom: 8px; }
        .resumen-m2 { background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #1e40af; }
        .resumen-m2 strong { font-size: 16px; font-weight: 800; }
        .item { background: #f1f5f9; border-radius: 8px; margin-bottom: 8px; overflow: hidden; border: 1.5px solid transparent; transition: border-color 0.2s; }
        .item.editing { border-color: #2563eb; background: #eff6ff; }
        .item-main { display: flex; justify-content: space-between; align-items: center; padding: 10px; }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 14px; }
        .item-detail { font-size: 12px; color: #64748b; margin-top: 2px; }
        .item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .item-price { font-weight: 700; color: #2563eb; font-size: 15px; white-space: nowrap; }
        .btn-edit-item { background: #dbeafe; border: none; color: #2563eb; font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-family: inherit; }
        .btn-del-item { background: none; border: none; color: #dc2626; font-size: 18px; cursor: pointer; padding: 4px; }
        .edit-panel { display: none; padding: 12px; border-top: 1.5px dashed #bfdbfe; }
        .edit-panel.open { display: block; }
        .edit-panel label { font-size: 11px; color: #64748b; margin-bottom: 3px; }
        .edit-panel input { font-size: 14px; padding: 8px; margin-bottom: 8px; }
        .edit-actions { display: flex; gap: 8px; margin-top: 4px; }
        .btn-save { flex: 1; padding: 9px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .btn-cancel { flex: 1; padding: 9px; background: #e2e8f0; color: #475569; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .total-box { background: #2563eb; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .total-amount { font-size: 24px; font-weight: 900; }
    </style>
</head>
<body>
<div class="container">
    <h1>📐 Cotizador Publicitario</h1>
    <div class="card">
        <div>
            <label>Producto / Servicio</label>
            <input type="text" id="producto" placeholder="Ej: Lona front, Vinil...">
        </div>
        <div>
            <label>Cantidad</label>
            <input type="number" id="cantidad" min="1" placeholder="1" value="1">
        </div>
        <div class="row">
            <div><label>Ancho (m)</label><input type="number" id="ancho" step="0.01" placeholder="0.00" oninput="calcularM2()"></div>
            <div><label>Largo (m)</label><input type="number" id="largo" step="0.01" placeholder="0.00" oninput="calcularM2()"></div>
        </div>
        <div class="m2-display">Total m²: <span id="displayM2">0.00</span></div>
        <div><label>Precio por m² ($)</label><input type="number" id="precioM2" step="0.01" placeholder="0.00"></div>
        <button class="btn btn-add" onclick="agregarItem()">+ Agregar a cotización</button>
    </div>

    <div class="card" id="seccion-lista" style="display:none">
        <div class="items-title">📋 Productos agregados</div>
        <div class="resumen-m2">
            <span>📐 Total m² (todos los productos)</span>
            <strong id="total-m2-general">0.00 m²</strong>
        </div>
        <div id="lista-items"></div>
        <div class="total-box">
            <span>TOTAL</span>
            <span class="total-amount" id="total-general">$0.00</span>
        </div>
        <button class="btn btn-ws" onclick="enviarWhatsApp()">📲 Enviar por WhatsApp</button>
        <button class="btn-clear" onclick="borrarTodo()">🗑️ Borrar todo y empezar de nuevo</button>
    </div>
</div>

<script>
let items = [];
let editandoId = null;

function calcularM2() {
    const a = parseFloat(document.getElementById('ancho').value) || 0;
    const l = parseFloat(document.getElementById('largo').value) || 0;
    const m2 = (a * l).toFixed(2);
    document.getElementById('displayM2').textContent = m2;
    return parseFloat(m2);
}

function agregarItem() {
    const producto = document.getElementById('producto').value.trim();
    const cantidad = parseInt(document.getElementById('cantidad').value) || 1;
    const ancho = parseFloat(document.getElementById('ancho').value) || 0;
    const largo = parseFloat(document.getElementById('largo').value) || 0;
    const precioM2 = parseFloat(document.getElementById('precioM2').value) || 0;
    const m2Unidad = parseFloat((ancho * largo).toFixed(4));
    const m2Total = parseFloat((m2Unidad * cantidad).toFixed(4));
    const total = parseFloat((m2Total * precioM2).toFixed(2));

    if (!producto || m2Unidad <= 0 || precioM2 <= 0) { alert("Por favor completa todos los datos"); return; }

    items.push({ id: Date.now(), producto, cantidad, ancho, largo, m2Unidad, m2Total, precioM2, total });

    document.getElementById('producto').value = '';
    document.getElementById('cantidad').value = '1';
    document.getElementById('ancho').value = '';
    document.getElementById('largo').value = '';
    document.getElementById('precioM2').value = '';
    document.getElementById('displayM2').textContent = '0.00';
    dibujar();
}

function eliminarItem(id) {
    items = items.filter(i => i.id !== id);
    dibujar();
}

function toggleEditar(id) {
    editandoId = editandoId === id ? null : id;
    dibujar();
}

function guardarEdicion(id) {
    const idx = items.findIndex(i => i.id === id);
    if (idx === -1) return;

    const producto = document.getElementById('edit-producto-' + id).value.trim();
    const cantidad = parseInt(document.getElementById('edit-cantidad-' + id).value) || 1;
    const ancho = parseFloat(document.getElementById('edit-ancho-' + id).value) || 0;
    const largo = parseFloat(document.getElementById('edit-largo-' + id).value) || 0;
    const precioM2 = parseFloat(document.getElementById('edit-precio-' + id).value) || 0;

    if (!producto || ancho <= 0 || largo <= 0 || precioM2 <= 0) { alert("Por favor completa todos los datos"); return; }

    const m2Unidad = parseFloat((ancho * largo).toFixed(4));
    const m2Total = parseFloat((m2Unidad * cantidad).toFixed(4));
    const total = parseFloat((m2Total * precioM2).toFixed(2));

    items[idx] = { id, producto, cantidad, ancho, largo, m2Unidad, m2Total, precioM2, total };
    editandoId = null;
    dibujar();
}

function borrarTodo() {
    if (confirm("¿Borrar toda la cotización?")) { items = []; editandoId = null; dibujar(); }
}

function dibujar() {
    const lista = document.getElementById('lista-items');
    const seccion = document.getElementById('seccion-lista');

    if (items.length === 0) { seccion.style.display = 'none'; return; }
    seccion.style.display = 'block';

    const totalM2 = items.reduce((s, i) => s + i.m2Total, 0);
    document.getElementById('total-m2-general').textContent = totalM2.toFixed(2) + ' m²';

    lista.innerHTML = items.map(i => `
        <div class="item ${editandoId === i.id ? 'editing' : ''}">
            <div class="item-main">
                <div class="item-info">
                    <div class="item-name">${i.producto}</div>
                    <div class="item-detail">${i.cantidad} unid · ${i.ancho}×${i.largo}m · ${i.m2Total.toFixed(2)}m² · $${i.precioM2}/m²</div>
                </div>
                <div class="item-right">
                    <span class="item-price">$${i.total.toFixed(2)}</span>
                    <button class="btn-edit-item" onclick="toggleEditar(${i.id})">${editandoId === i.id ? '✕' : '✏️'}</button>
                    <button class="btn-del-item" onclick="eliminarItem(${i.id})">✕</button>
                </div>
            </div>
            <div class="edit-panel ${editandoId === i.id ? 'open' : ''}">
                <div><label>Producto / Servicio</label><input type="text" id="edit-producto-${i.id}" value="${i.producto}"></div>
                <div><label>Cantidad</label><input type="number" id="edit-cantidad-${i.id}" value="${i.cantidad}" min="1"></div>
                <div style="display:flex;gap:10px;">
                    <div style="flex:1"><label>Ancho (m)</label><input type="number" id="edit-ancho-${i.id}" value="${i.ancho}" step="0.01"></div>
                    <div style="flex:1"><label>Largo (m)</label><input type="number" id="edit-largo-${i.id}" value="${i.largo}" step="0.01"></div>
                </div>
                <div><label>Precio por m² ($)</label><input type="number" id="edit-precio-${i.id}" value="${i.precioM2}" step="0.01"></div>
                <div class="edit-actions">
                    <button class="btn-save" onclick="guardarEdicion(${i.id})">✔ Guardar</button>
                    <button class="btn-cancel" onclick="toggleEditar(${i.id})">Cancelar</button>
                </div>
            </div>
        </div>`).join('');

    const total = items.reduce((s, i) => s + i.total, 0);
    document.getElementById('total-general').textContent = '$' + total.toFixed(2);
}

function enviarWhatsApp() {
    const lineas = items.map(i =>
        `• ${i.producto}\n  ${i.cantidad} unid · ${i.ancho}×${i.largo}m · ${i.m2Total.toFixed(2)}m² · $${i.precioM2}/m² = *$${i.total.toFixed(2)}*`
    ).join('\n');
    const totalM2 = items.reduce((s, i) => s + i.m2Total, 0);
    const total = items.reduce((s, i) => s + i.total, 0);
    const mensaje = `*📐 COTIZACIÓN*\n\n${lineas}\n\n▪️ Total m²: *${totalM2.toFixed(2)} m²*\n▪️ *TOTAL: $${total.toFixed(2)}*`;
    window.open('https://wa.me/?text=' + encodeURIComponent(mensaje), '_blank');
}

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw-cotizador.js').catch(() => {}); }
</script>
</body>
</html>
