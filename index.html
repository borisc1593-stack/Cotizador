<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Boris - Multiservicios</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; color: #334155; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-top: 0; color: var(--primary); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #64748b; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn-add { background: var(--accent); color: white; }
        .btn-clear { background: #64748b; color: white; }
        .btn-wa { background: #22c55e; color: white; margin-top: 20px; font-size: 1.1em; }
        
        #lista { margin-top: 15px; }
        .item-row { 
            background: #f1f5f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; 
            border-left: 5px solid var(--accent); position: relative; cursor: pointer;
        }
        .item-row:active { background: #e2e8f0; }
        .btn-del { position: absolute; right: 8px; top: 8px; background: #ef4444; color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
        .total-box { text-align: right; font-size: 1.4em; font-weight: bold; margin-top: 15px; padding-top: 10px; border-top: 2px solid #e2e8f0; }
        .hint { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cotizador</h2>
    
    <label>Descripción del Servicio</label>
    <input type="text" id="desc" placeholder="Ej: Vinil arenado">

    <div class="grid" style="margin-top:10px">
        <div><label>Ancho (m)</label><input type="number" id="ancho" step="0.01"></div>
        <div><label>Alto (m)</label><input type="number" id="alto" step="0.01"></div>
    </div>

    <div class="grid">
        <div><label>Cant.</label><input type="number" id="cant" value="1"></div>
        <div><label>Precio m² / Unid.</label><input type="number" id="precio" step="0.01"></div>
    </div>

    <button class="btn btn-add" onclick="agregar()">+ Agregar / Guardar</button>
    <button class="btn btn-clear" onclick="limpiarPantalla()">Limpiar Pantalla</button>
    <p class="hint">Toca un ítem de la lista para editarlo</p>

    <div id="lista"></div>

    <div class="total-box" id="gran-total">Total: $0.00</div>

    <button class="btn btn-wa" onclick="enviarWA()">Enviar a WhatsApp</button>
</div>

<script>
    let cotizacion = [];
    let editandoIndex = null;

    function agregar() {
        const desc = document.getElementById('desc').value;
        const ancho = parseFloat(document.getElementById('ancho').value) || 1;
        const alto = parseFloat(document.getElementById('alto').value) || 1;
        const cant = parseFloat(document.getElementById('cant').value) || 1;
        const precio = parseFloat(document.getElementById('precio').value) || 0;

        if(!desc || precio <= 0) return alert("Falta descripción o precio");

        const subtotal = ancho * alto * cant * precio;
        const nuevoItem = { desc, ancho, alto, cant, precio, subtotal };

        if (editandoIndex !== null) {
            cotizacion[editandoIndex] = nuevoItem;
            editandoIndex = null;
        } else {
            cotizacion.push(nuevoItem);
        }

        dibujar();
        resetForm();
    }

    function dibujar() {
        const lista = document.getElementById('lista');
        lista.innerHTML = '';
        let total = 0;

        cotizacion.forEach((item, index) => {
            total += item.subtotal;
            lista.innerHTML += `
                <div class="item-row" onclick="cargarParaEditar(${index})">
                    <button class="btn-del" onclick="event.stopPropagation(); eliminar(${index})">Borrar</button>
                    <strong>${item.desc}</strong><br>
                    Cant: ${item.cant} - Total: $${item.subtotal.toFixed(2)}
                </div>`;
        });

        document.getElementById('gran-total').innerText = `Total: $${total.toFixed(2)}`;
    }

    function cargarParaEditar(index) {
        const item = cotizacion[index];
        document.getElementById('desc').value = item.desc;
        document.getElementById('ancho').value = item.ancho;
        document.getElementById('alto').value = item.alto;
        document.getElementById('cant').value = item.cant;
        document.getElementById('precio').value = item.precio;
        editandoIndex = index;
        window.scrollTo(0,0);
    }

    function eliminar(index) {
        cotizacion.splice(index, 1);
        dibujar();
    }

    function limpiarPantalla() {
        if(confirm("¿Borrar todos los datos?")) {
            cotizacion = [];
            editandoIndex = null;
            dibujar();
            resetForm();
        }
    }

    function resetForm() {
        document.getElementById('desc').value = '';
        document.getElementById('ancho').value = '';
        document.getElementById('alto').value = '';
        document.getElementById('cant').value = '1';
        document.getElementById('precio').value = '';
    }

    function enviarWA() {
        if(cotizacion.length === 0) return;
        
        let msg = "*Cotización Multiservicios Gráficos*\n\n";
        let totalGeneral = 0;

        cotizacion.forEach(item => {
            msg += `• ${item.desc}\n`;
            msg += `  Cant: ${item.cant} - Total: $${item.subtotal.toFixed(2)}\n\n`;
            totalGeneral += item.subtotal;
        });

        msg += `*TOTAL A PAGAR: $${totalGeneral.toFixed(2)}*`;
        
        const url = "https://api.whatsapp.com/send?text=" + encodeURIComponent(msg);
        window.open(url, '_blank');
    }
</script>

</body>
</html>
